<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<!-- مهم جدًا للجوال -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بطاقة لمعلمتي إلهام الرحيلي</title>

<style>
body {
    margin: 0;
    font-family: "Tahoma", sans-serif;
    background: linear-gradient(135deg, #fce4ec, #e3f2fd);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* شاشة البداية */
.overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #e91e63, #2196f3);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    z-index: 10;
}

.overlay h2 {
    font-size: 28px;
}

button {
    margin-top: 20px;
    padding: 14px 30px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #e91e63;
    font-size: 18px;
    cursor: pointer;
}

/* البطاقة */
.card {
    background: white;
    padding: 50px;
    width: 90vw;
    max-width: 700px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* العنوان */
h1 {
    font-size: 32px;
    color: #e91e63;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #e91e63; }
    to { text-shadow: 0 0 25px #ff80ab; }
}

/* النص */
p {
    font-size: 20px;
    line-height: 2;
    color: #444;
}

/* التوقيع */
.signature {
    font-size: 22px;
    margin-top: 30px;
    font-weight: bold;
}

/* القلوب */
.heart {
    position: absolute;
    animation: rise 6s linear infinite;
}

@keyframes rise {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-1000px);
        opacity: 0;
    }
}
</style>

</head>

<body>

<!-- شاشة البداية -->
<div class="overlay" id="overlay">
    <h2>📩 لديك بطاقة جديدة</h2>
    <button onclick="openCard()">فتح البطاقة</button>
</div>

<!-- البطاقة -->
<div class="card" id="card" style="display:none;">

    <h1>إلى معلمتي إلهام الرحيلي 🌸</h1>

    <p>
        أبعث إليكِ أسمى آيات الشكر والتقدير،  
        لما قدمتِه من علمٍ نافع وعطاءٍ لا ينضب.  
        <br><br>
        كنتِ لنا نورًا يضيء الطريق،  
        وقدوةً في الأخلاق والعلم.  
        <br><br>
        أسأل الله أن يبارك فيكِ ويجزيكِ خير الجزاء 🤍
    </p>

    <div class="signature">
        من الطالب / إلياس الحربي
    </div>

</div>

<script>
function openCard(){
    document.getElementById("overlay").style.display = "none";
    document.getElementById("card").style.display = "block";
}

/* قلوب متحركة */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
